# media containers
name: media
services:

  jellyfin:
    image: ghcr.io/jellyfin/jellyfin:latest
    init: true
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
    group_add:
      - 44
      - 123
    devices:
      - /dev/dri
    volumes:
      - /tmp/jellyfin:/transcodes
      - /tank/containers/jellyfin:/config
      - /tank/containers/jellyfin-cache:/cache
      - /tank/cloud/video:/media/video
      - /tank/cloud/music:/media/music
      - /tank/cloud/books:/media/books
      - /tank/cloud/comics:/media/comics
    expose:
      - 8096
    depends_on:
      lldap:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
      - traefik.http.routers.jellyfin.middlewares=secure@file

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/seerr:/app/config
    expose:
      - 5055
    depends_on:
      jellyfin:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1" ]
      start_period: 20s
      timeout: 3s
      interval: 15s
    labels:
      - traefik.enable=true
      - traefik.http.services.seerr.loadbalancer.server.port=5055
      - traefik.http.routers.seerr.middlewares=secure@file

  gluetun:
    image: ghcr.io/qdm12/gluetun:v3
    init: true
    restart: always
    networks:
      - media
    cap_add:
      - NET_ADMIN
    env_file:
      - ../common.env
      - ../.config/gluetun/config.env
      - ../.config/gluetun/secrets.env
    expose:
      - 8080
    ports:
      - 6881:6881/tcp
      - 6881:6881/udp
    labels:
      - traefik.enable=true
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
      - traefik.http.routers.qbittorrent.middlewares=private-admin@file
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.viggy96.me`)

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: always
    network_mode: service:gluetun
    env_file:
      - ../common.env
      - ../www-data.env
    environment:
      - UMASK=022
      - WEBUI_PORT=8080
    depends_on:
      gluetun:
        condition: service_started
    volumes:
      - /tank/containers/qbittorrent:/config
      - /tank/downloads:/downloads
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:8080 || exit 1" ]

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
      - ../www-data.env
    environment:
      - UMASK=022
    volumes:
      - /tank/containers/nzbget:/config
      - /tank/downloads/nzbget:/downloads
    expose:
      - 6789
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:6789 || exit 1" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.nzbget.loadbalancer.server.port=6789
      - traefik.http.routers.nzbget.middlewares=private-admin@file

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    init: true
    restart: always
    user: 33:33
    networks:
      - media
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/recyclarr:/config
    healthcheck:
      test: [ "CMD-SHELL", "recyclarr config list local" ]

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/prowlarr:/config
    expose:
      - 9696
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:9696/ping" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
      - traefik.http.routers.prowlarr.middlewares=private-admin@file

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
      - ../www-data.env
    volumes:
      - /tank/containers/sonarr:/config
      - /tank/cloud/video/tv:/tv
      - /tank/downloads:/downloads
    expose:
      - 8989
    depends_on:
      nzbget:
        condition: service_started
      gluetun:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:8989/ping" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      - traefik.http.routers.sonarr.middlewares=private-admin@file

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
      - ../www-data.env
    volumes:
      - /tank/containers/radarr:/config
      - /tank/cloud/video/movies:/movies
      - /tank/downloads:/downloads
    expose:
      - 7878
    depends_on:
      nzbget:
        condition: service_started
      gluetun:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:7878/ping" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.radarr.loadbalancer.server.port=7878
      - traefik.http.routers.radarr.middlewares=private-admin@file

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
      - ../www-data.env
    volumes:
      - /tank/containers/lidarr:/config
      - /tank/cloud/music:/music
      - /tank/downloads:/downloads
    expose:
      - 8686
    depends_on:
      nzbget:
        condition: service_started
      gluetun:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:8686/ping" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.lidarr.loadbalancer.server.port=8686
      - traefik.http.routers.lidarr.middlewares=private-admin@file

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
      - ../www-data.env
    volumes:
      - /tank/containers/bazarr:/config
      - /tank/cloud/video/tv:/tv
      - /tank/cloud/video/movies:/movies
    expose:
      - 6767
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:6767/ping" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
      - traefik.http.routers.bazarr.middlewares=private-admin@file

  kapowarr:
    image: docker.io/mrcas/kapowarr:latest
    restart: always
    networks:
      - media
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/kapowarr:/app/db
      - /tank/cloud/comics:/comics
      - /tank/downloads:/downloads
    expose:
      - 5656
    depends_on:
      gluetun:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.services.kapowarr.loadbalancer.server.port=5656
      - traefik.http.routers.kapowarr.middlewares=private-admin@file

  komga:
    image: ghcr.io/gotson/komga:latest
    restart: always
    user: 33:33
    networks:
      - media
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/komga:/config
      - /tank/cloud/comics:/comics
      - /tank/cloud/books:/books
      - /tank/downloads:/downloads
    expose:
      - 25600
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:25600/actuator/health" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.komga.loadbalancer.server.port=25600
      - traefik.http.routers.komga.middlewares=secure@file
