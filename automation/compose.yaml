# automation containers
name: automation
services:

  home-assistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: always
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/home-assistant:/config
    expose:
      - 8123
    depends_on:
      pocket-id:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      zigbee2mqtt:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl --silent --show-error --fail http://localhost:8123/manifest.json || exit 1" ]
    labels:
      - traefik.enable=true
      - traefik.http.services.home-assistant.loadbalancer.server.port=8123
      - traefik.http.routers.home-assistant.middlewares=secure@file

  mosquitto:
    image: eclipse-mosquitto:latest
    restart: always
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/mosquitto:/mosquitto
    expose:
      - 1883
    healthcheck:
      test: [ "CMD-SHELL", "echo '' | nc 127.0.0.1 8080 || exit 1" ]
    labels:
      - traefik.enable=true
      - traefik.tcp.routers.mqtt.entrypoints=mqtt
      - traefik.tcp.routers.mqtt.tls=true
      - traefik.tcp.routers.mqtt.service=mqtt
      - traefik.tcp.services.mqtt.loadBalancer.server.port=1883

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    restart: always
    user: 1000:1000
    group_add:
      - dialout
    env_file:
      - ../common.env
    volumes:
      - /tank/containers/zigbee2mqtt:/app/data
    expose:
      - 8080
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
    labels:
      - traefik.enable=true
      - traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080
      - traefik.http.routers.zigbee2mqtt.middlewares=private-admin@file

  openthread:
    image: ghcr.io/ownbee/hass-otbr-docker:latest
    restart: always
    privileged: true
    network_mode: host
    dns: 127.0.0.1
    stdin_open: true
    tty: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - IPC_LOCK
    env_file:
      - ../common.env
    environment:
      DEVICE: /tmp/ttyOTBR
      NETWORK_DEVICE: 192.168.1.20:6638
      BAUDRATE: 460800
      FLOW_CONTROL: 0
      NAT64: 1
      OTBR_REST_PORT: 8081
      OTBR_WEB_PORT: 8085
      OTBR_REST_LISTEN_PORT: 8081
      AUTOFLASH_FIRMWARE: 0
      BACKBONE_IF: eno1
      OTBR_ENABLE: 1
      FIREWALL: 1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /tank/containers/openthread:/var/lib/thread
      - /etc/localtime:/etc/localtime:ro

  matter:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    restart: always
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - ../common.env
      - /tank/containers/matter:/data/
      - /run/dbus:/run/dbus:ro
    depends_on:
      openthread:
        condition: service_started
